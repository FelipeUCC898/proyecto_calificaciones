{% extends 'calificaciones/base.html' %}

{% block title %}Recuperar Contraseña{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 4rem auto;">
    <div class="card-header" style="text-align: center;">
        <div style="font-size: 3rem; margin-bottom: 1rem;">🔑</div>
        Recuperar Contraseña
    </div>

    <div class="alert alert-info">
        <strong>Información:</strong> Ingresa tu correo electrónico y te enviaremos instrucciones para restablecer tu contraseña.
    </div>

    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="id_email">Correo Electrónico</label>
            <input type="email" 
                   name="email" 
                   id="id_email" 
                   placeholder="tu@email.com"
                   required 
                   autofocus>
        </div>

        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primary" style="flex: 1;">
                Enviar Instrucciones
            </button>
            <a href="{% url 'login' %}" class="btn btn-secondary">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
