{% extends 'calificaciones/base.html' %}

{% block title %}Contraseña Restablecida{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 4rem auto;">
    <div class="card-header" style="text-align: center;">
        <div style="font-size: 3rem; margin-bottom: 1rem;">✅</div>
        Contraseña Restablecida
    </div>

    <div class="alert alert-success">
        <strong>¡Éxito!</strong> Tu contraseña ha sido restablecida correctamente.
    </div>

    <div style="color: #4a5568; line-height: 1.6; margin-bottom: 2rem;">
        <p>
            Ahora puedes iniciar sesión con tu nueva contraseña.
        </p>
    </div>

    <div style="text-align: center;">
        <a href="{% url 'login' %}" class="btn btn-primary" style="width: 100%;">
            Iniciar Sesión
        </a>
    </div>
</div>
{% endblock %}
